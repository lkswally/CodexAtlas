name: Evidence Browser Smoke

on:
  workflow_dispatch:

jobs:
  evidence-browser-smoke:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install pytest playwright
          python -m playwright install chromium

      - name: Evidence browser smoke
        run: |
          New-Item -ItemType Directory -Force -Path .atlas_test_tmp | Out-Null
          $env:ATLAS_RUN_REAL_BROWSER_SMOKE = "1"
          python -m pytest tests\test_evidence_runner_real_smoke.py -q --basetemp=.atlas_test_tmp\evidence-browser-smoke

      - name: Evidence baseline tests
        run: |
          python -m pytest `
            tests\test_evidence_runner.py `
            tests\test_evidence_contract_validator.py `
            tests\test_evidence_session.py `
            tests\test_evidence_bundle_summary.py `
            tests\test_evidence_bundle_summary_cli.py `
            tests\test_evidence_quality_gate_adapter.py `
            tests\test_evidence_quality_report.py `
            tests\test_evidence_quality_report_cli.py `
            -q

      - name: Prepare Evidence Browser Smoke artifact
        if: always()
        run: |
          $artifactPath = "evidence-browser-smoke-artifact"
          if (Test-Path $artifactPath) {
            Remove-Item -LiteralPath $artifactPath -Recurse -Force
          }
          New-Item -ItemType Directory -Force -Path $artifactPath | Out-Null
          if (Test-Path ".atlas_test_tmp\evidence-browser-smoke") {
            Get-ChildItem ".atlas_test_tmp\evidence-browser-smoke" -Recurse -File |
              Where-Object { $_.Name -eq "evidence-bundle.json" -or $_.Extension -eq ".png" } |
              Copy-Item -Destination $artifactPath
          }
          Get-ChildItem $artifactPath -Force

      - name: Upload Evidence Browser Smoke artifact
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: evidence-browser-smoke
          path: evidence-browser-smoke-artifact/**
          if-no-files-found: ignore

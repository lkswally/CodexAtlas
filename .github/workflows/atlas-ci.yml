name: Atlas CI

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  governance-checks:
    runs-on: windows-2025
    defaults:
      run:
        shell: pwsh
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if (Test-Path "requirements-dev.txt") {
            python -m pip install -r requirements-dev.txt
          } else {
            python -m pip install pytest
          }

      - name: Atlas verify
        run: python tools\atlas_verify.py

      - name: Atlas governance check
        run: python tools\atlas_governance_check.py

      - name: MCP readiness check
        run: python tools\mcp_readiness_check.py

      - name: Focused governance tests
        run: python -m pytest tests\test_skill_governance.py tests\test_quality_gate_report.py tests\test_atlas_project_bootstrap.py tests\test_atlas_run.py -q

      - name: Git diff check
        run: git diff --check
